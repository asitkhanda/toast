<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Toast</title>
        <link rel="icon" href="favicon.png" type="image/png" />
        <link rel="apple-touch-icon" href="apple-touch-icon.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            type="text/css"
            href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css"
        />
        <meta
            name="description"
            content="A lightweight MacOS menu bar application to check your vercel deployments"
        />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://toast.asit.space/" />
        <meta property="og:title" content="Toast" />
        <meta
            property="og:description"
            content="A lightweight MacOS menu bar application to check your vercel deployments"
        />
        <meta
            property="og:image"
            content="https://toast.asit.space/og-image.png"
        />
        <meta
            property="og:image:alt"
            content="Toast — a macOS menu bar app for Vercel deployment status"
        />
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Toast" />
        <meta
            name="twitter:description"
            content="A lightweight MacOS menu bar application to check your vercel deployments"
        />
        <meta
            name="twitter:image"
            content="https://toast.asit.space/og-image.png"
        />
        <style>
            :root {
                --yellow: #f1b712;
                --orange: #de6601;
                --text: #0a0a0a;
                --muted: #525252;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                background: #ffffff;
                color: var(--text);
                font-family:
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                line-height: 1.5;
            }

            a {
                color: inherit;
            }

            .site-header {
                display: grid;
                grid-template-columns: 1fr auto 1fr;
                align-items: center;
                gap: 1rem;
                padding: 1.5rem clamp(1.25rem, 4vw, 3rem);
            }

            .brand {
                display: inline-flex;
                align-items: center;
                gap: 0.625rem;
                text-decoration: none;
                justify-self: start;
            }

            .brand img {
                width: 2rem;
                height: 2rem;
                border-radius: 0.375rem;
                object-fit: cover;
            }

            .brand span {
                font-size: 1.125rem;
                font-weight: 700;
                letter-spacing: -0.02em;
            }

            .nav-contact {
                justify-self: center;
                font-size: 0.9375rem;
                font-weight: 500;
                text-decoration: none;
                white-space: nowrap;
            }

            .nav-contact:hover {
                opacity: 0.7;
            }

            .download-btn {
                justify-self: end;
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.625rem 1.125rem;
                border-radius: 9999px;
                background: var(--orange);
                color: #ffffff;
                text-decoration: none;
                font-size: 0.9375rem;
                font-weight: 500;
                white-space: nowrap;
                transition: background 0.15s ease;
            }

            .download-btn:hover {
                background: #c95a01;
            }

            .download-btn .ph {
                font-size: 1rem;
            }

            main {
                flex: 1;
            }

            .hero {
                padding: 1rem clamp(1.25rem, 4vw, 3rem) 3rem;
                text-align: center;
            }

            .hero h1 {
                font-family: "Crimson Text", Georgia, "Times New Roman", serif;
                font-size: clamp(2rem, 4.5vw, 3.25rem);
                font-weight: 400;
                line-height: 1.15;
                letter-spacing: -0.01em;
                max-width: 52rem;
                margin: 0 auto 2.5rem;
            }

            .hero-visual {
                background: var(--yellow);
                border-radius: 1.25rem;
                padding: clamp(1rem, 3vw, 2rem);
                max-width: 72rem;
                margin: 0 auto;
            }

            .hero-visual img {
                display: block;
                width: 100%;
                height: auto;
                border-radius: 0.5rem;
            }

            .site-footer {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 1.5rem;
                padding: 1.5rem clamp(1.25rem, 4vw, 3rem) 2rem;
                font-family:
                    ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
                    monospace;
                font-size: 0.8125rem;
                color: var(--muted);
            }

            .footer-left {
                display: flex;
                align-items: center;
                gap: 1rem;
                flex-wrap: wrap;
            }

            .footer-brand img {
                display: block;
                height: 1.5rem;
                width: auto;
            }

            .footer-social {
                display: flex;
                align-items: center;
                gap: 0.625rem;
            }

            .footer-social a {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 1.75rem;
                height: 1.75rem;
                color: var(--text);
                text-decoration: none;
                transition: opacity 0.15s ease;
            }

            .footer-social a:hover {
                opacity: 0.65;
            }

            .footer-social .ph {
                font-size: 1.125rem;
            }

            .footer-right {
                display: flex;
                align-items: center;
                gap: 1.25rem;
                white-space: nowrap;
            }

            .footer-right a {
                color: var(--muted);
                text-decoration: none;
                transition: color 0.15s ease;
            }

            .footer-right a:hover {
                color: var(--text);
            }

            @media (max-width: 640px) {
                .site-header {
                    grid-template-columns: 1fr auto;
                    grid-template-rows: auto auto;
                }

                .brand {
                    grid-column: 1;
                    grid-row: 1;
                }

                .download-btn {
                    grid-column: 2;
                    grid-row: 1;
                }

                .nav-contact {
                    grid-column: 1 / -1;
                    grid-row: 2;
                    justify-self: start;
                    margin-top: 0.25rem;
                }

                .site-footer {
                    flex-direction: column;
                    align-items: flex-start;
                }
            }
        </style>
    </head>
    <body>
        <header class="site-header">
            <a class="brand" href="/">
                <img src="toast_logo.png" width="32" height="32" alt="" />
                <span>Toast</span>
            </a>
            <a class="nav-contact" href="mailto:asit@hey.com">Contact Me</a>
            <a class="download-btn" href="/download">
                Download
                <i class="ph ph-arrow-up-right" aria-hidden="true"></i>
            </a>
        </header>

        <main>
            <section class="hero">
                <h1>
                    A lightweight MacOS menu bar app to check your vercel
                    deployments
                </h1>
                <div class="hero-visual">
                    <img
                        src="hero_image.png"
                        width="2940"
                        height="1912"
                        alt="Toast menu bar app showing Vercel deployment status for three projects"
                    />
                </div>
            </section>
        </main>

        <footer class="site-footer">
            <div class="footer-left">
                <a
                    class="footer-brand"
                    href="https://asit.space"
                    rel="noopener noreferrer"
                >
                    <img
                        src="AKLogo.png"
                        width="700"
                        height="150"
                        alt="Asit Khanda"
                    />
                </a>
                <span>© Asit Khanda. 2026.</span>
            </div>
            <div class="footer-right">
                <a href="/privacy">Privacy Policy</a>
                <a href="/terms">Terms of Service</a>
            </div>
        </footer>
    </body>
</html>
