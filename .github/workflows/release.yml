name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from Info.plist
        id: version
        run: |
          PLIST="VercelStatus/Resources/Info.plist"
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST")
          BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST")
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME#v}"
            if [ "$TAG" != "$VERSION" ]; then
              echo "Tag v$TAG does not match CFBundleShortVersionString $VERSION in Info.plist"
              exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "zip_name=Vercel-Status-${VERSION}.zip" >> "$GITHUB_OUTPUT"
          echo "dmg_name=Vercel-Status-${VERSION}.dmg" >> "$GITHUB_OUTPUT"

      - name: Build app
        run: |
          cd VercelStatus
          ./build.sh

      - name: Sign update archive
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "SPARKLE_PRIVATE_KEY secret is not configured"
            exit 1
          fi
          ZIP="VercelStatus/dist/${{ steps.version.outputs.zip_name }}"
          SIGN_UPDATE=$(find VercelStatus/.build/artifacts -path "*/Sparkle/bin/sign_update" | head -1)
          if [ -z "$SIGN_UPDATE" ]; then
            echo "sign_update tool not found"
            exit 1
          fi
          SIGN_OUTPUT=$(echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" --ed-key-file - "$ZIP")
          echo "$SIGN_OUTPUT"
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          LENGTH=$(echo "$SIGN_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')
          if [ -z "$ED_SIGNATURE" ] || [ -z "$LENGTH" ]; then
            echo "Failed to parse sign_update output"
            exit 1
          fi
          echo "ed_signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "length=$LENGTH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: Vercel Status ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            VercelStatus/dist/${{ steps.version.outputs.dmg_name }}
            VercelStatus/dist/${{ steps.version.outputs.zip_name }}

      - name: Update appcast
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build }}
          ED_SIGNATURE: ${{ steps.sign.outputs.ed_signature }}
          LENGTH: ${{ steps.sign.outputs.length }}
          TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          REPO: ${{ github.repository }}
        run: python3 scripts/update-appcast.py

      - name: Commit appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp web/public/appcast.xml /tmp/appcast.xml
          git fetch origin main
          git switch -C main origin/main
          cp /tmp/appcast.xml web/public/appcast.xml
          git add web/public/appcast.xml
          if git diff --staged --quiet; then
            echo "No appcast changes to commit"
            exit 0
          fi
          git commit -m "Update appcast for ${{ steps.version.outputs.version }} [skip ci]"
          git push origin main
