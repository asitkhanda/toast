name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Xcode
        run: sudo xcodebuild -runFirstLaunch

      - name: Read version from Info.plist
        id: version
        run: |
          PLIST="Toast/Resources/Info.plist"
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST")
          BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST")
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME#v}"
            if [ "$TAG" != "$VERSION" ]; then
              echo "Tag v$TAG does not match CFBundleShortVersionString $VERSION in Info.plist"
              exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "zip_name=Toast-${VERSION}.zip" >> "$GITHUB_OUTPUT"
          echo "dmg_name=Toast-${VERSION}.dmg" >> "$GITHUB_OUTPUT"

      - name: Build app
        run: |
          cd Toast
          ./build.sh

      - name: Upload dSYMs to PostHog
        env:
          POSTHOG_CLI_HOST: https://us.posthog.com
          POSTHOG_CLI_API_KEY: ${{ secrets.POSTHOG_CLI_API_KEY }}
          POSTHOG_CLI_PROJECT_ID: ${{ secrets.POSTHOG_CLI_PROJECT_ID }}
        run: |
          if [ -z "$POSTHOG_CLI_API_KEY" ] || [ -z "$POSTHOG_CLI_PROJECT_ID" ]; then
            echo "Skipping PostHog dSYM upload — secrets not configured"
            exit 0
          fi
          UPLOAD_SCRIPT="$(find Toast/.build/checkouts -path '*/posthog-ios/build-tools/upload-symbols.sh' 2>/dev/null | head -1)"
          if [ -z "$UPLOAD_SCRIPT" ]; then
            echo "PostHog upload-symbols.sh not found — skipping"
            exit 0
          fi
          chmod +x "$UPLOAD_SCRIPT"
          "$UPLOAD_SCRIPT" Toast/dist/Toast.dSYM

      - name: Generate checksums
        id: checksums
        run: |
          cd Toast/dist
          shasum -a 256 *.dmg *.zip > SHA256SUMS.txt
          echo "checksums_path=Toast/dist/SHA256SUMS.txt" >> "$GITHUB_OUTPUT"
          cat SHA256SUMS.txt

      - name: Sign update archive
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "SPARKLE_PRIVATE_KEY secret is not configured"
            exit 1
          fi
          ZIP="Toast/dist/${{ steps.version.outputs.zip_name }}"
          SIGN_UPDATE=$(find Toast/.build/artifacts -path "*/Sparkle/bin/sign_update" | head -1)
          if [ -z "$SIGN_UPDATE" ]; then
            echo "sign_update tool not found"
            exit 1
          fi
          SIGN_OUTPUT=$(echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" --ed-key-file - "$ZIP")
          echo "$SIGN_OUTPUT"
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          LENGTH=$(echo "$SIGN_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')
          if [ -z "$ED_SIGNATURE" ] || [ -z "$LENGTH" ]; then
            echo "Failed to parse sign_update output"
            exit 1
          fi
          echo "ed_signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "length=$LENGTH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: Toast ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            Toast/dist/${{ steps.version.outputs.dmg_name }}
            Toast/dist/${{ steps.version.outputs.zip_name }}
            Toast/dist/SHA256SUMS.txt

      - name: Bump Homebrew cask
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DMG_NAME: ${{ steps.version.outputs.dmg_name }}
          TAP_REPO: asitkhanda/toast-tap
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          DMG_SHA=$(awk -v dmg="$DMG_NAME" '$2 == dmg { print $1; exit }' Toast/dist/SHA256SUMS.txt)
          if [ -z "$DMG_SHA" ]; then
            echo "Could not find SHA256 for $DMG_NAME in SHA256SUMS.txt"
            exit 1
          fi
          if ! git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" /tmp/toast-tap 2>/dev/null; then
            echo "Skipping Homebrew cask bump — could not clone ${TAP_REPO}"
            echo "Create the tap repo and add HOMEBREW_TAP_TOKEN if needed."
            exit 0
          fi
          cd /tmp/toast-tap
          cp "$GITHUB_WORKSPACE/scripts/bump-homebrew-cask.sh" /tmp/bump-homebrew-cask.sh
          chmod +x /tmp/bump-homebrew-cask.sh
          /tmp/bump-homebrew-cask.sh "$VERSION" "$DMG_SHA" Casks/toast-app.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/toast-app.rb
          if git diff --staged --quiet; then
            echo "No cask changes to commit"
            exit 0
          fi
          git commit -m "Bump toast-app to ${VERSION}"
          git push origin HEAD

      - name: Update appcast
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build }}
          ED_SIGNATURE: ${{ steps.sign.outputs.ed_signature }}
          LENGTH: ${{ steps.sign.outputs.length }}
          TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          REPO: ${{ github.repository }}
        run: python3 scripts/update-appcast.py

      - name: Commit appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp web/public/appcast.xml /tmp/appcast.xml
          git fetch origin main
          git switch -C main origin/main
          cp /tmp/appcast.xml web/public/appcast.xml
          git add web/public/appcast.xml
          if git diff --staged --quiet; then
            echo "No appcast changes to commit"
            exit 0
          fi
          git commit -m "Update appcast for ${{ steps.version.outputs.version }} [skip ci]"
          git push origin main
