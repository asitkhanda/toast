name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: macos-26
    outputs:
      version: ${{ steps.version.outputs.version }}
      build: ${{ steps.version.outputs.build }}
      zip_name: ${{ steps.version.outputs.zip_name }}
      dmg_name: ${{ steps.version.outputs.dmg_name }}
      win_setup_name: ${{ steps.version.outputs.win_setup_name }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from Info.plist
        id: version
        run: |
          PLIST="Toast/Resources/Info.plist"
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST")
          BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST")
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$TAG_VERSION" != "$VERSION" ]; then
              echo "Tag v$TAG_VERSION does not match CFBundleShortVersionString $VERSION in Info.plist"
              exit 1
            fi
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="$GITHUB_REF_NAME"
          else
            TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "zip_name=Toast-${VERSION}.zip" >> "$GITHUB_OUTPUT"
          echo "dmg_name=Toast-${VERSION}.dmg" >> "$GITHUB_OUTPUT"
          echo "win_setup_name=Toast-${VERSION}-win-x64-Setup.exe" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  release-mac:
    needs: version
    runs-on: macos-26
    outputs:
      ed_signature: ${{ steps.sign.outputs.ed_signature }}
      length: ${{ steps.sign.outputs.length }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Xcode
        run: sudo xcodebuild -runFirstLaunch

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "APPLE_CERTIFICATE_P12 or APPLE_CERTIFICATE_PASSWORD is not configured."
            exit 1
          fi
          chmod +x Toast/scripts/import-signing-certificate.sh
          Toast/scripts/import-signing-certificate.sh

      - name: Prepare notarization credentials
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          if [ -n "$APPLE_API_KEY" ]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
            printf '%s\n' "$APPLE_API_KEY" > "$KEY_PATH"
            chmod 600 "$KEY_PATH"
            echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          fi

      - name: Build app
        timeout-minutes: 20
        env:
          NOTARIZE: "1"
          NOTARIZE_TIMEOUT: "15m"
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd Toast
          ./build.sh

      - name: Upload dSYMs to PostHog
        env:
          POSTHOG_CLI_HOST: https://us.posthog.com
          POSTHOG_CLI_API_KEY: ${{ secrets.POSTHOG_CLI_API_KEY }}
          POSTHOG_CLI_PROJECT_ID: ${{ secrets.POSTHOG_CLI_PROJECT_ID }}
        run: |
          if [ -z "$POSTHOG_CLI_API_KEY" ] || [ -z "$POSTHOG_CLI_PROJECT_ID" ]; then
            echo "Skipping PostHog dSYM upload — secrets not configured"
            exit 0
          fi
          UPLOAD_SCRIPT="$(find Toast/.build/checkouts -path '*/posthog-ios/build-tools/upload-symbols.sh' 2>/dev/null | head -1)"
          if [ -z "$UPLOAD_SCRIPT" ]; then
            echo "PostHog upload-symbols.sh not found — skipping"
            exit 0
          fi
          chmod +x "$UPLOAD_SCRIPT"
          "$UPLOAD_SCRIPT" Toast/dist/Toast.dSYM

      - name: Sign update archive
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "SPARKLE_PRIVATE_KEY secret is not configured"
            exit 1
          fi
          ZIP="Toast/dist/${{ needs.version.outputs.zip_name }}"
          SIGN_UPDATE=$(find Toast/.build/artifacts -path "*/Sparkle/bin/sign_update" | head -1)
          if [ -z "$SIGN_UPDATE" ]; then
            echo "sign_update tool not found"
            exit 1
          fi
          SIGN_OUTPUT=$(echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" --ed-key-file - "$ZIP")
          echo "$SIGN_OUTPUT"
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          LENGTH=$(echo "$SIGN_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')
          if [ -z "$ED_SIGNATURE" ] || [ -z "$LENGTH" ]; then
            echo "Failed to parse sign_update output"
            exit 1
          fi
          echo "ed_signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "length=$LENGTH" >> "$GITHUB_OUTPUT"

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-release
          path: |
            Toast/dist/${{ needs.version.outputs.dmg_name }}
            Toast/dist/${{ needs.version.outputs.zip_name }}
          if-no-files-found: error

      - name: Bump Homebrew cask
        continue-on-error: true
        env:
          VERSION: ${{ needs.version.outputs.version }}
          DMG_NAME: ${{ needs.version.outputs.dmg_name }}
          TAP_REPO: asitkhanda/homebrew-toast-tap
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          cd Toast/dist
          shasum -a 256 "$DMG_NAME" > /tmp/mac-dmg.sha
          DMG_SHA=$(awk '{ print $1; exit }' /tmp/mac-dmg.sha)
          if [ -z "$DMG_SHA" ]; then
            echo "Could not compute SHA256 for $DMG_NAME"
            exit 1
          fi
          if ! git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" /tmp/toast-tap 2>/dev/null; then
            echo "Skipping Homebrew cask bump — could not clone ${TAP_REPO}"
            exit 0
          fi
          cd /tmp/toast-tap
          cp "$GITHUB_WORKSPACE/scripts/bump-homebrew-cask.sh" /tmp/bump-homebrew-cask.sh
          chmod +x /tmp/bump-homebrew-cask.sh
          /tmp/bump-homebrew-cask.sh "$VERSION" "$DMG_SHA" Casks/toast-app.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/toast-app.rb
          if git diff --staged --quiet; then
            echo "No cask changes to commit"
            exit 0
          fi
          git commit -m "Bump toast-app to ${VERSION}"
          git push origin HEAD

      - name: Update appcast
        env:
          VERSION: ${{ needs.version.outputs.version }}
          BUILD: ${{ needs.version.outputs.build }}
          ED_SIGNATURE: ${{ steps.sign.outputs.ed_signature }}
          LENGTH: ${{ steps.sign.outputs.length }}
          TAG: ${{ needs.version.outputs.tag }}
          REPO: ${{ github.repository }}
        run: python3 scripts/update-appcast.py

      - name: Commit appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp web/public/appcast.xml /tmp/appcast.xml
          git fetch origin main
          git switch -C main origin/main
          cp /tmp/appcast.xml web/public/appcast.xml
          git add web/public/appcast.xml
          if git diff --staged --quiet; then
            echo "No appcast changes to commit"
            exit 0
          fi
          git commit -m "Update appcast for ${{ needs.version.outputs.version }} [skip ci]"
          git push origin main

  release-win:
    needs: version
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build Windows package
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_P12: ${{ secrets.WINDOWS_CERTIFICATE_P12 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $sign = $false
          if ($env:WINDOWS_CERTIFICATE_P12 -and $env:WINDOWS_CERTIFICATE_PASSWORD) {
            $sign = $true
          }
          if ($sign) {
            ./toast-win/build.ps1 -Version "${{ needs.version.outputs.version }}" -Sign
          } else {
            Write-Host "WINDOWS_CERTIFICATE_* secrets not set — building unsigned Windows package."
            ./toast-win/build.ps1 -Version "${{ needs.version.outputs.version }}"
          }

      - name: Upload Windows artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: win-release
          path: |
            toast-win/dist/${{ needs.version.outputs.win_setup_name }}
            toast-win/dist/**
          if-no-files-found: warn

  publish:
    needs: [version, release-mac, release-win]
    if: always() && needs.release-mac.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-release
          path: release-assets

      - name: Download Windows artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: win-release
          path: release-assets

      - name: Normalize Windows Setup.exe name
        shell: bash
        run: |
          mkdir -p release-assets
          SETUP="${{ needs.version.outputs.win_setup_name }}"
          if [ -f "release-assets/$SETUP" ]; then
            echo "Found $SETUP"
            exit 0
          fi
          FOUND=$(find release-assets -name '*Setup.exe' -type f | head -1 || true)
          if [ -n "$FOUND" ]; then
            cp "$FOUND" "release-assets/$SETUP"
            echo "Normalized $FOUND -> $SETUP"
          else
            echo "No Windows Setup.exe in artifacts — publishing Mac-only release."
          fi

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          : > SHA256SUMS.txt
          for f in ${{ needs.version.outputs.dmg_name }} ${{ needs.version.outputs.zip_name }} ${{ needs.version.outputs.win_setup_name }}; do
            if [ -f "$f" ]; then
              shasum -a 256 "$f" >> SHA256SUMS.txt
            fi
          done
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Toast ${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: |
            release-assets/${{ needs.version.outputs.dmg_name }}
            release-assets/${{ needs.version.outputs.zip_name }}
            release-assets/${{ needs.version.outputs.win_setup_name }}
            release-assets/SHA256SUMS.txt
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
